<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Void Deck Survivor - SG Flood RPG</title>
  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --primary: #0088cc;
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f8fafc;
      --accent: #38bdf8;
      --success: #22c55e;
      --danger: #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      box-sizing: border-box;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 12px;
      margin-bottom: 16px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      background: #38bdf8;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .title-area h2 {
      margin: 0;
      font-size: 18px;
      color: var(--accent);
    }

    .title-area p {
      margin: 2px 0 0;
      font-size: 12px;
      opacity: 0.7;
    }

    .score-badge {
      background: rgba(56, 189, 248, 0.2);
      color: var(--accent);
      padding: 6px 12px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 14px;
      text-align: center;
      margin-bottom: 16px;
      border: 1px solid var(--accent);
    }

    .dialogue-box {
      background: rgba(0,0,0,0.3);
      padding: 14px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 14px;
      margin-bottom: 20px;
      border-left: 4px solid var(--accent);
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .restart-btn {
      background: var(--success);
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <div class="avatar">👧</div>
      <div class="title-area">
        <h2>Mei Ling (美玲)</h2>
        <p>Youth Volunteer • FloodReady SG</p>
      </div>
    </div>

    <div class="score-badge" id="score-display">
      📊 Resilience Score: 50 pts
    </div>

    <div class="dialogue-box" id="dialogue">
      "Wahlau! Look at the sky above the void deck... pitch black sia! PUB just pushed a flash flood warning for our estate.<br><br>I'm heading out as a youth volunteer. Want to team up and keep our neighborhood safe?"
    </div>

    <div class="btn-group" id="action-buttons">
      <button onclick="startStage1()">▶️ Team up with Mei Ling!</button>
    </div>
  </div>

  <script>
    // Initialize Telegram Mini App SDK
    if (window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand(); // Make full screen inside Telegram
    }

    let score = 50;

    function updateScore(points) {
      score += points;
      document.getElementById("score-display").innerText = `📊 Resilience Score: ${score} pts`;
    }

    function startStage1() {
      document.getElementById("dialogue").innerHTML = 
        "<b>Stage 1: MRT Linkway Dash</b><br><br>" +
        "\"Water is building up fast on the pathway near the MRT station. I can't see the drain cover under the murky water!<br><br>What's our move?\"";

      document.getElementById("action-buttons").innerHTML = `
        <button onclick="stage1Choice(false)">👟 Option A: Dash through 20cm murky water in slippers</button>
        <button onclick="stage1Choice(true)">🚶‍♂️ Option B: Take the elevated, covered ramp detour</button>
      `;
    }

    function stage1Choice(isCorrect) {
      if (isCorrect) {
        updateScore(15);
        document.getElementById("dialogue").innerHTML = 
          "<b>Mei Ling:</b> \"Steady lah! Swee decision. Taking elevated ramps avoids hidden open drains and keeps us dry!\"";
      } else {
        updateScore(-15);
        document.getElementById("dialogue").innerHTML = 
          "<b>Mei Ling:</b> \"Aiyo! Dangerous lah! Water deeper than 15cm can sweep you off your feet, plus open drain gratings are hidden underneath!\"";
      }

      document.getElementById("action-buttons").innerHTML = `
        <button onclick="startStage2()">➡️ On to Stage 2!</button>
      `;
    }

    function startStage2() {
      document.getElementById("dialogue").innerHTML = 
        "<b>Stage 2: Void Deck Hero</b><br><br>" +
        "\"Look over there! Auntie Rose is struggling through ankle-deep water at the void deck with her grocery trolley!<br><br>Quick, what do we do?\"";

      document.getElementById("action-buttons").innerHTML = `
        <button onclick="stage2Choice(true)">🤝 Option A: Help Auntie Rose safely up to the lift lobby</button>
        <button onclick="stage2Choice(false)">📱 Option B: Film a 15-second TikTok of the void deck ponding</button>
      `;
    }

    function stage2Choice(isCorrect) {
      if (isCorrect) {
        updateScore(20);
        document.getElementById("dialogue").innerHTML = 
          "<b>Mei Ling:</b> \"You're a true Kampung Hero! Auntie Rose gave us curry puffs later to say thank you. True community spirit!\"";
      } else {
        updateScore(-20);
        document.getElementById("dialogue").innerHTML = 
          "<b>Mei Ling:</b> \"Wahlau eh... you got 500 views on TikTok, but Auntie Rose slipped and dropped her groceries! Not steady at all.\"";
      }

      document.getElementById("action-buttons").innerHTML = `
        <button onclick="startStage3()">➡️ Final Stage 3!</button>
      `;
    }

    function startStage3() {
      document.getElementById("dialogue").innerHTML = 
        "<b>Stage 3: Choked Storm Drain</b><br><br>" +
        "\"Water is backing up rapidly near the MRT linkway. A storm drain is completely choked with fallen leaves and trash!<br><br>How should we handle this?\"";

      document.getElementById("action-buttons").innerHTML = `
        <button onclick="stage3Choice(true)">📸 Option A: Snap a photo & report via FloodReady Bot</button>
        <button onclick="stage3Choice(false)">⚠️ Option B: Try to pry open the heavy iron grate by hand</button>
      `;
    }

    function stage3Choice(isCorrect) {
      if (isCorrect) {
        updateScore(20);
        document.getElementById("dialogue").innerHTML = 
          "<b>Mei Ling:</b> \"Swee lah! Reporting via the bot dispatches Town Council teams fast while keeping us safe from open drains!\"";
      } else {
        updateScore(-20);
        document.getElementById("dialogue").innerHTML = 
          "<b>Mei Ling:</b> \"Wahlau! Heavy iron grates in rushing water can crush your fingers! Always leave grate removal to PUB teams!\"";
      }

      document.getElementById("action-buttons").innerHTML = `
        <button onclick="endGame()">🏆 See Final Rank</button>
      `;
    }

    function endGame() {
      let badge = "";
      let title = "";

      if (score >= 75) {
        badge = "🏆 RANK: SG KAMPUNG LEGEND";
        title = "Swee lah! You protected our estate, helped neighbours, and kept residents safe!";
      } else if (score >= 50) {
        badge = "🥈 RANK: YOUTH VOLUNTEER";
        title = "Not bad! Good effort, but keep practicing flood awareness guidelines!";
      } else {
        badge = "🌧️ RANK: WET SOCKS BYSTANDER";
        title = "Aiyo! We need to train your flood survival instincts. Try playing again!";
      }

      document.getElementById("dialogue").innerHTML = `
        <b>🏁 GAME OVER - VOID DECK SURVIVOR</b><br><br>
        <b>${badge}</b><br>
        <i>${title}</i>
      `;

      document.getElementById("action-buttons").innerHTML = `
        <button class="restart-btn" onclick="location.reload()">🔄 Play Again</button>
      `;
    }
  </script>
</body>
</html>
